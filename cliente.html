<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navalha APP - Bem-vindo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="fundo-cliente"> <div class="container-cliente">
        
        <div class="topo-cliente">
            <div class="logo-circle" id="logo-cliente-tela" style="margin: 0 auto 15px auto;">NAV</div>
            <h1 class="titulo-app" id="nome-barbearia-cliente">Carregando...</h1>
            <p class="subtitulo">Seja bem-vindo(a)! O que você deseja fazer?</p>
        </div>

        <div class="opcoes-cliente">
            
            <button class="btn-gigante btn-mostarda" onclick="irParaAgendamento()">
                <span class="material-symbols-rounded">calendar_add_on</span>
                AGENDAR UM HORÁRIO
            </button>

            <button class="btn-gigante btn-escuro" onclick="irParaConsulta()">
                <span class="material-symbols-rounded">search</span>
                CONSULTAR MEU AGENDAMENTO
            </button>

        </div>

    </div>

    <script src="cliente.js"></script>
</body>
</html>
