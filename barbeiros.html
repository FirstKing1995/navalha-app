<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navalha APP - Equipe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="fundo-cinza">

    <header class="topo-app">
        <div class="logo-redonda-pequena">NAV</div>
        <div class="info-topo">
            <h2>Nossa Equipe</h2>
        </div>
    </header>

    <main class="container-dashboard">
        
        <button class="btn-principal btn-adicionar" onclick="abrirModalNovo()">
            <span class="material-symbols-rounded">add_circle</span>
            Cadastrar Novo Profissional
        </button>

        <div id="lista-equipe">
            </div>

    </main>

    <div id="modal-barbeiro" class="modal-overlay" style="display: none;">
        <div class="modal-conteudo">
            <h2 id="titulo-modal" style="font-family: 'Bebas Neue'; color: var(--cor-principal); font-size: 24px; margin-bottom: 20px;">Cadastrar Profissional</h2>
            
            <form id="form-novo-barbeiro">
                <input type="hidden" id="barbeiro-id"> <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
                    <img id="preview-foto" src="" style="width: 50px; height: 50px; border-radius: 50%; display: none; object-fit: cover;">
                    <div class="grupo-input" style="flex: 1; margin: 0;">
                        <label>Foto (Opcional)</label>
                        <input type="file" id="barbeiro-foto" accept="image/*">
                    </div>
                </div>

                <div class="grupo-input">
                    <label>Nome do Profissional</label>
                    <input type="text" id="barbeiro-nome" required>
                </div>

                <div class="grupo-input">
                    <label>WhatsApp (Opcional)</label>
                    <input type="tel" id="barbeiro-telefone" placeholder="(DDD) 90000-0000">
                </div>

                <hr style="border: none; border-top: 1px dashed #CCC; margin: 20px 0;">

                <div class="grupo-input">
                    <label style="color: var(--cor-destaque); font-size: 14px;">Serviços que ele realiza:</label>
                    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                        <input type="text" id="input-servico-nome" placeholder="Ex: Corte" style="flex: 2; padding: 10px; border: 1px solid #CCC; border-radius: 5px; font-family: 'Montserrat';">
                        <input type="number" id="input-servico-valor" placeholder="R$" style="flex: 1; padding: 10px; border: 1px solid #CCC; border-radius: 5px; font-family: 'Montserrat';">
                        <input type="text" id="input-servico-tempo" placeholder="Ex: 40min" style="flex: 1; padding: 10px; border: 1px solid #CCC; border-radius: 5px; font-family: 'Montserrat';">
                        <button type="button" onclick="addServico()" style="background: var(--cor-principal); color: #FFF; border: none; border-radius: 5px; padding: 0 15px; cursor: pointer;">+</button>
                    </div>
                    <div id="lista-servicos-adicionados" style="display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: #555;"></div>
                </div>

                <hr style="border: none; border-top: 1px dashed #CCC; margin: 20px 0;">

                <div class="grupo-input">
                    <label style="color: var(--cor-destaque); font-size: 14px;">Horários de Trabalho:</label>
                    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                        <select id="input-horario-dia" style="flex: 2; padding: 10px; border: 1px solid #CCC; border-radius: 5px; font-family: 'Montserrat';">
                            <option value="Segunda">Segunda</option>
                            <option value="Terça">Terça</option>
                            <option value="Quarta">Quarta</option>
                            <option value="Quinta">Quinta</option>
                            <option value="Sexta">Sexta</option>
                            <option value="Sábado">Sábado</option>
                            <option value="Domingo">Domingo</option>
                        </select>
                        <input type="time" id="input-horario-inicio" style="flex: 1; padding: 10px; border: 1px solid #CCC; border-radius: 5px; font-family: 'Montserrat';">
                        <input type="time" id="input-horario-fim" style="flex: 1; padding: 10px; border: 1px solid #CCC; border-radius: 5px; font-family: 'Montserrat';">
                        <button type="button" onclick="addHorario()" style="background: var(--cor-principal); color: #FFF; border: none; border-radius: 5px; padding: 0 15px; cursor: pointer;">+</button>
                    </div>
                    <div id="lista-horarios-adicionados" style="display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: #555;"></div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 25px;">
                    <button type="button" class="btn-voltar-simples" style="flex: 1; border: 1px solid #CCC; padding: 12px; border-radius: 5px;" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn-principal" id="btn-salvar-form" style="flex: 1;">SALVAR</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="menu-inferior">
        <a href="dashboard.html" class="menu-item"><span class="material-symbols-rounded">space_dashboard</span><span>Início</span></a>
        <a href="agendamentos.html" class="menu-item"><span class="material-symbols-rounded">calendar_month</span><span>Agenda</span></a>
        <a href="barbeiros.html" class="menu-item ativo"><span class="material-symbols-rounded">content_cut</span><span>Equipe</span></a>
        <a href="link.html" class="menu-item"><span class="material-symbols-rounded">share</span><span>Link</span></a>
        <a href="perfil.html" class="menu-item"><span class="material-symbols-rounded">person</span><span>Perfil</span></a>
    </nav>

    <script src="barbeiros.js"></script>
</body>
</html>
