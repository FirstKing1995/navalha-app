<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navalha APP - Painel Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="fundo-admin"> <div class="container-login">
        <div class="box-login box-admin">
            <div class="logo-area">
                <div class="logo-circle" style="background: var(--cor-destaque); color: var(--cor-principal);">SaaS</div>
            </div>
            
            <h1 class="titulo-app" style="color: #FFF;">ACESSO RESTRITO</h1>
            <p class="subtitulo" style="color: #AAA;">Painel do Administrador Geral</p>

            <form id="form-admin-login">
                <div class="grupo-input input-admin">
                    <label>E-mail Corporativo</label>
                    <input type="email" id="admin-email" required>
                </div>

                <div class="grupo-input input-admin">
                    <label>Senha de Acesso</label>
                    <input type="password" id="admin-senha" required>
                </div>

                <button type="submit" class="btn-principal" style="margin-top: 20px;">ENTRAR NO SISTEMA</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
