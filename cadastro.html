<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navalha APP - Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div class="container-login">
        <div class="box-login">
            <h1 class="titulo-app">CRIE SUA CONTA</h1>
            <p class="subtitulo">Cadastre sua barbearia no Navalha APP</p>

            <form id="form-cadastro">
                <div class="grupo-input">
                    <label for="nome">Nome da Barbearia</label>
                    <input type="text" id="nome" placeholder="Ex: Barbearia do João" required>
                </div>

                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu melhor e-mail" required>
                </div>

                <div class="grupo-input">
                    <label for="whatsapp">WhatsApp</label>
                    <input type="tel" id="whatsapp" placeholder="(DDD) 90000-0000" required>
                </div>

                <div class="grupo-input">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha forte" required>
                </div>

                <button type="submit" class="btn-principal">CADASTRAR</button>
            </form>

            <div class="area-cadastro">
                <p>Já tem uma conta?</p>
                <button class="btn-secundario" onclick="window.location.href='index.html'">FAZER LOGIN</button>
            </div>
        </div>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
