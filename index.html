<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navalha APP - Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-login">
        <div class="box-login">
            <div class="logo-area">
                <div class="logo-circle">NAVALHA</div>
            </div>
            
            <h1 class="titulo-app">BEM-VINDO(A)</h1>
            <p class="subtitulo">Acesse sua barbearia</p>

            <form id="form-login">
                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="grupo-input">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Sua senha" required>
                </div>

                <a href="#" class="link-esqueci-senha">Esqueci minha senha</a>

                <button type="submit" class="btn-principal">ENTRAR</button>
            </form>

            <div class="area-cadastro">
                <p>Não tem uma assinatura?</p>
                <button class="btn-secundario">CRIAR CONTA</button>
            </div>
        </div>
    </div>

    <script>
        // Apenas para evitar que a página recarregue ao clicar no botão por enquanto
        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Em breve, isso vai conectar com nossa planilha!");
        });
    </script>
</body>
</html>
